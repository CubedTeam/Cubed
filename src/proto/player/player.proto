syntax = "proto3";

import "common/vector3.proto";

message C2S_PlayerInfo {
    string uuid = 1;
    Vec3 pos = 2;
    float yaw = 3;
    float pitch = 4;
    int32 gait = 5;
}

message PlayerInfoRsp {
    string uuid = 1;
    string name = 2;
    Vec3 pos = 3;
    float yaw = 4;
    float pitch = 5;
    int32 gait = 6;
}